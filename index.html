.cal-months { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }

.task-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

.btn-done:hover { color: var(--teal); }

/* Confirm */
.confirm-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.15s ease; }

  const diff=prazo-Date.now(), h=diff/3600000;
  const d=new Date(prazo), lbl=d.toLocaleDateString('pt-PT',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
  if(diff<0)return'<span class="due-badge overdue">Expirou '+lbl+'</span>';
  if(h<24)return'<span class="due-badge soon">Hoje '+lbl+'</span>';
  return'<span class="due-badge ok">'+lbl+'</span>';
}
function itemCls(t){if(!t.prazo)return'task-item';const d=t.prazo-Date.now();return d<0?'task-item overdue':d<86400000?'task-item due-soon':'task-item';}

// Voice
let rec=false,recog=null,silT=null,vBuf='',vStop=false;
function toggleVoice(){if(rec)stopVoice();else startVoice();}
function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showVErr('Navegador nao suporta voz.');return;}vBuf='';vStop=false;initRec();}
function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang='pt-PT';recog.continuous=false;recog.interimResults=true;
  recog.onstart=()=>{rec=true;micUI();};
  recog.onresult=e=>{const p=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('formInput').value=(vBuf+' '+p).trim();clearTimeout(silT);silT=setTimeout(()=>stopVoice(),3000);};
  recog.onend=()=>{if(vStop){rec=false;micUI();const t=document.getElementById('formInput').value;if(t)analVoz(t);return;}vBuf=document.getElementById('formInput').value;try{initRec();}catch(e){}};
  recog.onerror=e=>{if(e.error==='not-allowed'){vStop=true;rec=false;micUI();showVErr('Microfone negado.');}};
  recog.start();
}
function stopVoice(){clearTimeout(silT);vStop=true;rec=false;micUI();if(recog){try{recog.stop();}catch(e){}recog=null;}}
function analVoz(texto){
  const t=texto.trim();
  const cK={'Trabalho':['trabalho'],'Pessoal':['pessoal'],'Casa':['casa'],'Estudos':['estudos','estudo'],'Saude':['saude'],'Lazer':['lazer'],'Outros':['outros']};
  const pK={'alta':['alta'],'media':['media'],'baixa':['baixa']};
  const re=new RegExp('\\s+regista(?:\\s+em)?(?:\\s+('+Object.values(cK).flat().join('|')+')?(?:\\s+('+Object.values(pK).flat().join('|')+'))?\\s*$','i');
  const m=t.match(re);if(!m){document.getElementById('formInput').value=t;return;}
  const limpo=t.slice(0,m.index).trim();
  let cd=null,pd=null;
  if(m[1])for(const[c,ks]of Object.entries(cK)){if(ks.includes(m[1].toLowerCase())){cd=c;break;}}
  if(m[2])for(const[p,ks]of Object.entries(pK)){if(ks.includes(m[2].toLowerCase())){pd=p;break;}}
  document.getElementById('formInput').value=limpo||t;
  if(cd)document.getElementById('formCat').value=cd;
  if(pd)document.getElementById('formPri').value=pd;
  if(cd||pd){const el=document.getElementById('voiceFeedback');el.textContent='Detetado: '+(cd?'Cat: '+cd:'')+(cd&&pd?' | ':'')+(pd?'Pri: '+PRIO[pd].label:'');el.style.display='block';setTimeout(()=>{el.style.display='none';},3000);}
}
function micUI(){document.getElementById('btnMic').classList.toggle('recording',rec);document.getElementById('recStatus').style.display=rec?'flex':'none';document.getElementById('formCard').classList.toggle('recording',rec);}
function showVErr(m){const el=document.getElementById('voiceError');el.textContent=m;el.style.display='block';}

// Form
function openForm(id){
  editingId=id||null;
  document.getElementById('addArea').style.display='none';
  document.getElementById('formCard').style.display='block';
  document.getElementById('voiceError').style.display='none';
  document.getElementById('voiceFeedback').style.display='none';
  document.getElementById('editLabel').style.display=editingId?'flex':'none';
  document.getElementById('btnSave').textContent=editingId?'Guardar':'Adicionar';
  document.getElementById('formCard').classList.toggle('editing',!!editingId);
  // populate selects
  const cat=document.getElementById('formCat'), pri=document.getElementById('formPri');
  cat.innerHTML=CATS.map(c=>'<option>'+c+'</option>').join('');
  pri.innerHTML=Object.entries(PRIO).map(e=>'<option value="'+e[0]+'">'+e[1].label+'</option>').join('');
  if(editingId){
    const t=tasks.find(t=>t.id===editingId);
    if(t){
      document.getElementById('formInput').value=t.texto;
      cat.value=t.categoria; pri.value=t.prioridade;
      if(t.prazo){const d=new Date(t.prazo),p=n=>String(n).padStart(2,'0');document.getElementById('formDue').value=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}
      else document.getElementById('formDue').value='';
    }
  } else {
    document.getElementById('formInput').value='';
    document.getElementById('formDue').value='';
    cat.value='Pessoal'; pri.value='media';
  }
  document.getElementById('formInput').focus();
}
function openFormVoice(){openForm();setTimeout(startVoice,150);}
function closeForm(){stopVoice();rec=false;micUI();editingId=null;document.getElementById('formCard').style.display='none';document.getElementById('formCard').classList.remove('editing');document.getElementById('addArea').style.display='block';}
function clearDue(){document.getElementById('formDue').value='';}
function formKeydown(e){if(e.key==='Enter')saveTask();if(e.key==='Escape')closeForm();}
function saveTask(){
  const texto=document.getElementById('formInput').value.trim();if(!texto)return;
  const dv=document.getElementById('formDue').value, prazo=dv?new Date(dv).getTime():null;
  const cat=document.getElementById('formCat').value, pri=document.getElementById('formPri').value;
  if(editingId){const t=tasks.find(t=>t.id===editingId);if(t){t.texto=texto;t.categoria=cat;t.prioridade=pri;t.prazo=prazo;}}
  else tasks.unshift({id:Date.now(),texto,categoria:cat,prioridade:pri,concluida:false,criadaEm:Date.now(),concluidaEm:null,prazo});
  save();closeForm();render();
}

// Task actions
function editTask(id){openForm(id);}
function doneTask(id){const t=tasks.find(t=>t.id===id);if(!t)return;pendingId=id;document.getElementById('confirmTaskName').textContent=t.texto;document.getElementById('confirmOverlay').style.display='flex';}
function doConfirm(){const id=pendingId;cancelConfirm();if(id!==null){const t=tasks.find(t=>t.id===id);if(t){t.concluida=true;t.concluidaEm=Date.now();}save();render();}}
function cancelConfirm(e){if(e&&e.target!==document.getElementById('confirmOverlay'))return;pendingId=null;document.getElementById('confirmOverlay').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&pendingId!==null)cancelConfirm();});

function svgChk(done,sm){const s=sm?14:18;return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="'+(done?'var(--teal)':'#c8c8c8')+'" stroke-width="1.5" fill="'+(done?'var(--teal)':'transparent')+'"/>'+(done?'<polyline points="5,9 8,12 13,6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' :'')+'</svg>';}

function render(){
  const pend=tasks.filter(t=>!t.concluida);
  document.getElementById('badge').textContent=pend.length;
  document.getElementById('subtitle').textContent=pend.length===0?'Tudo em dia!':pend.length+' tarefa'+(pend.length>1?'s':'')+' pendente'+(pend.length>1?'s':'');
  document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
  const cu=[...new Set(pend.map(t=>t.categoria))];
  const ac=['Todas',...CATS.filter(c=>cu.includes(c))];
  if(!ac.includes(filtroCat))filtroCat='Todas';
  document.getElementById('catFilters').innerHTML=ac.map(c=>'<button class="filter-btn'+(filtroCat===c?' active':'')+'" onclick="setCat(\''+c+'\')">'+c+'</button>').join('');
  const filt=pend.filter(t=>filtroCat==='Todas'?true:t.categoria===filtroCat);
  const list=document.getElementById('taskList');
  if(!filt.length){list.innerHTML='<p class="empty">Nenhuma tarefa pendente.</p>';return;}
  list.innerHTML=filt.map(t=>{
    const p=PRIO[t.prioridade];
    const badge=t.prazo?dueBadgeHtml(t.prazo):'<span class="'+waitCls(t.criadaEm)+'">'+waitLabel(t.criadaEm)+'</span>';
    return'<div class="'+itemCls(t)+'" data-id="'+t.id+'">'+
      '<div class="task-body">'+
        '<p class="task-text">'+esc(t.texto)+'</p>'+
        '<div class="task-bottom">'+
          '<span class="tag">'+esc(t.categoria)+'</span>'+
          '<span class="priority-tag" style="color:'+p.color+';background:'+p.color+'18">'+p.label+'</span>'+
          badge+
        '</div>'+
      '</div>'+
      '<div class="task-actions">'+
        '<button class="btn-edit" onclick="editTask('+t.id+')" title="Editar">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'+
        '</button>'+
        '<button class="btn-done" onclick="doneTask('+t.id+')" title="Concluir">'+
          '<svg width="16" height="16" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="7" stroke="currentColor" stroke-width="1.4"/><polyline points="5,8.5 7.5,11 12,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '</button>'+
      '</div>'+
    '</div>';
  }).join('');
}
function setCat(c){filtroCat=c;render();}

// Calendar
function toggleCal(){const p=document.getElementById('calPopup'),v=p.style.display!=='none';p.style.display=v?'none':'block';if(!v){selDay=null;renderCal();}}
function renderCal(){
  const p=document.getElementById('calPopup'),hoje=new Date();
  const dim=new Date(CAL_ANO,calMonth+1,0).getDate(),fd=new Date(CAL_ANO,calMonth,1).getDay();
  const cells=Array(fd).fill(null).concat(Array.from({length:dim},(_,i)=>i+1));
  const dd=new Set(tasks.filter(t=>t.concluida&&t.concluidaEm).map(t=>{const d=new Date(t.concluidaEm);if(d.getFullYear()===CAL_ANO&&d.getMonth()===calMonth)return d.getDate();return null;}).filter(Boolean));
  const gc=cells.map(d=>{let c='cal-day';if(d&&selDay===d)c+=' selected';else if(d&&hoje.getFullYear()===CAL_ANO&&hoje.getMonth()===calMonth&&hoje.getDate()===d)c+=' today';if(d&&dd.has(d))c+=' has-done';return'<button class="'+c+'" '+((!d)?'disabled':'')+' onclick="selCalDay('+d+')">'+(d||'')+'</button>';}).join('');
  let dp='';
  if(selDay){const dt=tasks.filter(t=>{if(!t.concluida||!t.concluidaEm)return false;const d=new Date(t.concluidaEm);return d.getFullYear()===CAL_ANO&&d.getMonth()===calMonth&&d.getDate()===selDay;});const it=dt.length===0?'<p class="done-panel-empty">Nenhuma concluida neste dia.</p>':dt.map(t=>'<div class="done-item"><div class="done-check">'+svgChk(true,true)+'</div><div class="done-body"><p class="done-text">'+esc(t.texto)+'</p><p class="done-meta">'+fmtDt(t.criadaEm)+' - '+fmtDt(t.concluidaEm)+'</p></div></div>').join('');dp='<div class="done-panel"><p class="done-panel-title">'+selDay+' de '+MESES[calMonth]+'</p>'+it+'</div>';}
  p.innerHTML='<div class="cal-header"><button class="cal-nav" '+(calMonth===0?'disabled':'')+' onclick="calNav(-1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="cal-month-title">'+MESES[calMonth]+' '+CAL_ANO+'</span><button class="cal-nav" '+(calMonth===11?'disabled':'')+' onclick="calNav(1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div><div class="cal-grid">'+DIAS.map(d=>'<div class="cal-dow">'+d+'</div>').join('')+gc+'</div><div class="cal-months"><p>Ir para mes</p><div class="cal-months-grid">'+MESES.map((m,i)=>'<button class="cal-month-btn'+(calMonth===i?' active':'')+'" onclick="calGoto('+i+')">'+m.slice(0,3)+'</button>').join('')+'</div></div>'+dp;
}
function calNav(d){calMonth=Math.max(0,Math.min(11,calMonth+d));selDay=null;renderCal();}
function calGoto(m){calMonth=m;selDay=null;renderCal();}
function selCalDay(d){selDay=(selDay===d)?null:d;renderCal();}
document.addEventListener('mousedown',e=>{const w=document.getElementById('calWrap');if(!w.contains(e.target))document.getElementById('calPopup').style.display='none';});

function showInstallBanner(){const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent),isS=window.navigator.standalone===true,dis=localStorage.getItem('installDismissed');if(isIOS&&!isS&&!dis)document.getElementById('installBanner').style.display='flex';}
function dismissBanner(){localStorage.setItem('installDismissed','1');document.getElementById('installBanner').style.display='none';}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
setInterval(render,60000);
render();showInstallBanner();
</script>
